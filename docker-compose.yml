services:
  db:
    image: postgres:16-alpine
    container_name: nba_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nba_db}
      POSTGRES_USER: ${POSTGRES_USER:-nba_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nba_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nba_user} -d ${POSTGRES_DB:-nba_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: nba_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py populate_cache &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-nba_user}:${POSTGRES_PASSWORD:-nba_password}@db:5432/${POSTGRES_DB:-nba_db}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
